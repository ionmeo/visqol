name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: true
      run_id:
        description: 'GitHub Actions run ID (find it in the URL of the build run)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts from build
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: artifacts/*
          generate_release_notes: true
